name: Feature request
description: Suggest a new feature or enhancement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature.

        Before filing, please check that:

        - There isn't already an [open issue](https://github.com/prisma/prisma-next/issues?q=is%3Aissue) covering the same idea.
        - The feature fits the [project's contract-first direction](https://github.com/prisma/prisma-next/blob/main/README.md). Suggestions that conflict with the architecture (e.g. "emit imperative client code") are unlikely to land — that doesn't mean we don't want to hear them, but please understand they may be declined.

        If your idea is large enough that it would meaningfully change the public API, expect that landing it will likely require a brief design discussion in the issue before any PR is opened.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point this would address. Concrete > abstract.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would the API / behaviour look like? A snippet of how you'd want to use it is often the clearest way to communicate.
      placeholder: |
        ```ts
        // Imagined usage
        await db.users.where(...).bulkUpsert(rows, { conflictTarget: 'email' });
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried working around this with the current API? What didn't work?
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: |
        Which package(s) would this touch? Would it be a breaking change? Are there target-specific implications (Postgres / SQLite / Mongo)?
    validations:
      required: false
