name: Detect inert diff
description: >
  Classify the current diff as "inert" — touching only files that cannot
  affect build/test/fixture results (docs, markdown, rules, skills, transient
  project artefacts). Fail-safe: a diff is inert only if *every* changed file
  matches the allow-list below; any unrecognized path yields inert=false. The
  caller must check out the repository with fetch-depth: 0 first. Handles
  pull_request and merge_group; on any other event inert is always false.

outputs:
  inert:
    description: "'true' only if every changed file is in the inert allow-list."
    value: ${{ steps.detect.outputs.inert }}

runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
        MG_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
      run: |
        set -euo pipefail
        case "$EVENT_NAME" in
          pull_request) BASE_SHA="$PR_BASE_SHA"; HEAD_SHA="$PR_HEAD_SHA" ;;
          merge_group)  BASE_SHA="$MG_BASE_SHA"; HEAD_SHA="$MG_HEAD_SHA" ;;
          *)
            echo "Event $EVENT_NAME has no diff range; treating diff as non-inert."
            echo "inert=false" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac
        git cat-file -e "$BASE_SHA" 2>/dev/null || git fetch --no-tags --depth=1 origin "$BASE_SHA"
        git cat-file -e "$HEAD_SHA" 2>/dev/null || git fetch --no-tags --depth=1 origin "$HEAD_SHA"
        files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
        echo "Changed files:"
        echo "$files"
        inert=true
        while IFS= read -r f; do
          [ -z "$f" ] && continue
          case "$f" in
            *.md) ;;             # any markdown, anywhere
            docs/*) ;;           # documentation tree
            projects/*) ;;       # transient project artefacts (never imported)
            skills-contrib/*) ;; # skill sources (linted, not tested)
            .agents/*) ;;        # rules/skills (linted, not tested)
            .cursor/*) ;;
            .claude/*) ;;
            LICENSE) ;;
            *) inert=false; break ;;
          esac
        done <<EOF
        $files
        EOF
        echo "inert=$inert" >> "$GITHUB_OUTPUT"
        echo "Diff is inert: $inert"
